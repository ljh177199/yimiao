<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑公告 - 疫苗管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 24px 32px;
            color: white;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }
        .form-wrapper {
            padding: 32px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .form-group label .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #4facfe;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        .form-group input[type="text"]::placeholder {
            color: #aaa;
        }
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafafa;
            resize: vertical;
            min-height: 200px;
            line-height: 1.6;
        }
        .form-group textarea:focus {
            outline: none;
            border-color: #4facfe;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        .form-group textarea::placeholder {
            color: #aaa;
        }
        .char-counter {
            text-align: right;
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }
        .char-counter.warning {
            color: #f39c12;
        }
        .char-counter.error {
            color: #e74c3c;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            border: 2px solid #e0e0e0;
        }
        .btn-secondary:hover {
            background: #eee;
            border-color: #ccc;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #4facfe;
            text-decoration: underline;
        }
        .flash-message {
            padding: 14px 16px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .flash-success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid #28a745;
        }
        .flash-error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 1px solid #dc3545;
        }
        .flash-message .icon {
            font-size: 18px;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        @media (max-width: 600px) {
            .container {
                margin: 10px;
                border-radius: 8px;
            }
            .header {
                padding: 16px 20px;
            }
            .header h1 {
                font-size: 20px;
            }
            .form-wrapper {
                padding: 20px;
            }
            .button-group {
                flex-direction: column;
            }
            .btn {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>编辑公告</h1>
        </div>
        
        <div class="form-wrapper">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}">
                            <span class="icon">{{ '✓' if category == 'success' else '✕' }}</span>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" id="editForm">
                <div class="form-group">
                    <label for="title">标题 <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="title" 
                        name="title" 
                        value="{{ announcement.title }}" 
                        required
                        maxlength="100"
                        placeholder="请输入公告标题"
                    >
                    <div class="char-counter" id="titleCounter">0/100</div>
                    <div class="error-message" id="titleError">标题不能为空</div>
                </div>
                
                <div class="form-group">
                    <label for="content">内容 <span class="required">*</span></label>
                    <textarea 
                        id="content" 
                        name="content" 
                        required
                        maxlength="2000"
                        placeholder="请输入公告内容...">{{ announcement.content }}</textarea>
                    <div class="char-counter" id="contentCounter">0/2000</div>
                    <div class="error-message" id="contentError">内容不能为空</div>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="handleCancel()">
                        取消
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span class="btn-text">保存修改</span>
                    </button>
                </div>
            </form>
            
            <a href="{{ url_for('admin_dashboard') }}" class="back-link">
                ← 返回管理后台
            </a>
        </div>
    </div>

    <script>
        // 字数统计
        const titleInput = document.getElementById('title');
        const titleCounter = document.getElementById('titleCounter');
        const contentInput = document.getElementById('content');
        const contentCounter = document.getElementById('contentCounter');
        
        titleInput.addEventListener('input', function() {
            const count = this.value.length;
            titleCounter.textContent = count + '/100';
            updateCounterClass(titleCounter, count, 100);
        });
        
        contentInput.addEventListener('input', function() {
            const count = this.value.length;
            contentCounter.textContent = count + '/2000';
            updateCounterClass(contentCounter, count, 2000);
        });
        
        function updateCounterClass(counter, count, max) {
            counter.classList.remove('warning', 'error');
            if (count > max * 0.9) {
                counter.classList.add('warning');
            }
            if (count >= max) {
                counter.classList.add('error');
            }
        }
        
        // 触发初始统计
        titleInput.dispatchEvent(new Event('input'));
        contentInput.dispatchEvent(new Event('input'));
        
        // 表单验证
        const form = document.getElementById('editForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        form.addEventListener('submit', function(e) {
            let isValid = true;
            
            // 验证标题
            if (!titleInput.value.trim()) {
                document.getElementById('titleError').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('titleError').classList.remove('show');
            }
            
            // 验证内容
            if (!contentInput.value.trim()) {
                document.getElementById('contentError').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('contentError').classList.remove('show');
            }
            
            if (!isValid) {
                e.preventDefault();
                return;
            }
            
            // 显示加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner" style="width: 20px; height: 20px; border-width: 2px;"></span> 保存中...';
            loadingOverlay.classList.add('active');
        });
        
        // 取消按钮
        function handleCancel() {
            if (hasChanges()) {
                if (confirm('您的修改尚未保存，确定要离开吗？')) {
                    window.location.href = '{{ url_for("admin_dashboard") }}';
                }
            } else {
                window.location.href = '{{ url_for("admin_dashboard") }}';
            }
        }
        
        // 检测是否有修改
        const originalTitle = '{{ announcement.title }}';
        const originalContent = '{{ announcement.content }}';
        
        function hasChanges() {
            return titleInput.value !== originalTitle || contentInput.value !== originalContent;
        }
        
        // 返回链接也需要确认
        document.querySelector('.back-link').addEventListener('click', function(e) {
            if (hasChanges() && !confirm('您的修改尚未保存，确定要离开吗？')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
